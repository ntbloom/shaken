name: npm build and test
run-name: ${{ github.actor }} running CI for stirred
on: [push]
jobs:
  validate-backend:
    runs-on: node:current-alpine
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: npm install

      - name: Lint
        run: |
          npm run check-format
          npm run lint

      - name: test
        run: npm run test
